<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devidayal Solar Solutions</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --blue: #003087; --yellow: #F4B400; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--blue);
    font-family: 'Rajdhani', sans-serif;
    display: flex; align-items: center; justify-content: center;
  }

  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.2rem;
    text-align: center;
    padding: 2rem;
  }

  .logo-wrap img {
    width: 220px;
    height: auto;
    display: block;
  }

  .divider {
    width: 48px; height: 2px;
    background: var(--yellow);
    border-radius: 2px;
  }

  .btns {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    width: 260px;
  }

  .btn {
    display: flex; align-items: center; justify-content: center; gap: 0.6rem;
    padding: 1rem;
    border-radius: 6px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-decoration: none;
    transition: transform 0.18s, box-shadow 0.18s;
  }
  .btn-yellow {
    background: var(--yellow);
    color: var(--blue);
    box-shadow: 0 4px 20px rgba(244,180,0,0.3);
  }
  .btn-yellow:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(244,180,0,0.5); }

  .btn-ghost {
    background: transparent;
    color: white;
    border: 2px solid rgba(255,255,255,0.25);
  }
  .btn-ghost:hover { border-color: rgba(255,255,255,0.6); transform: translateY(-2px); }

  .tagline {
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }
</style>
</head>
